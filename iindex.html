<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image to PDF Suite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh;color:white;}

/* Animated Corner Logo */
.logo{
    position:fixed;
    top:20px;
    right:25px;
    font-weight:700;
    font-size:18px;
    letter-spacing:1px;
    background:linear-gradient(90deg,#3b82f6,#06b6d4,#3b82f6);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 3s linear infinite;
}

@keyframes shine{
    to{background-position:200% center;}
}

.app{
    width:950px;
    background:#111827;
    border-radius:20px;
    padding:30px;
    box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

h1{font-size:22px;margin-bottom:20px;}

.drop-zone{
    border:2px dashed #3b82f6;
    padding:25px;
    border-radius:14px;
    text-align:center;
    cursor:pointer;
    background:#1f2937;
}

input[type="file"]{display:none;}

.preview{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.image-box{
    position:relative;
    width:110px;
    height:110px;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:12px;
}

.delete-btn{
    position:absolute;
    top:-6px;
    right:-6px;
    background:#ef4444;
    border:none;
    border-radius:50%;
    width:22px;
    height:22px;
    color:white;
    cursor:pointer;
}

.controls{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

select,button{
    padding:12px;
    border-radius:10px;
    border:none;
    font-weight:600;
}

select{background:#1f2937;color:white;}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{background:#2563eb;}

.progress-container{
    margin-top:15px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
    display:none;
}

.progress-bar{
    height:12px;
    width:0%;
    background:#3b82f6;
    transition:width 0.3s ease;
}

.progress-text{
    text-align:center;
    margin-top:6px;
    font-size:13px;
    display:none;
}
</style>
</head>

<body>

<div class="logo">xyphorasoft</div>

<div class="app">
<h1>Image to PDF Professional Suite</h1>

<label class="drop-zone" id="dropZone">
Click or Drag & Drop Images
<input type="file" id="fileInput" multiple accept="image/*">
</label>

<div class="preview" id="preview"></div>

<div class="controls">
<select id="compression">
<option value="1">High Quality</option>
<option value="0.7">Balanced</option>
<option value="0.4">Maximum Compression</option>
</select>

<button onclick="generatePDF()">Generate PDF</button>
</div>

<div class="progress-container" id="progressContainer">
<div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText">0%</div>

</div>

<script>
const { jsPDF } = window.jspdf;
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
const progressBar=document.getElementById("progressBar");
const progressText=document.getElementById("progressText");
const progressContainer=document.getElementById("progressContainer");

let imagesArray=[];

fileInput.addEventListener("change",(e)=>{
    Array.from(e.target.files).forEach(file=>{
        const reader=new FileReader();
        reader.onload=(ev)=>{
            imagesArray.push(ev.target.result);
            renderImages();
        };
        reader.readAsDataURL(file);
    });
});

function renderImages(){
    preview.innerHTML="";
    imagesArray.forEach((src,index)=>{
        const box=document.createElement("div");
        box.className="image-box";
        box.draggable=true;

        const img=document.createElement("img");
        img.src=src;

        const del=document.createElement("button");
        del.className="delete-btn";
        del.innerHTML="×";
        del.onclick=()=>{
            imagesArray.splice(index,1);
            renderImages();
        };

        box.appendChild(img);
        box.appendChild(del);
        preview.appendChild(box);

        box.addEventListener("dragstart",()=>dragIndex=index);
        box.addEventListener("dragover",(e)=>e.preventDefault());
        box.addEventListener("drop",()=>{
            [imagesArray[dragIndex],imagesArray[index]]=
            [imagesArray[index],imagesArray[dragIndex]];
            renderImages();
        });
    });
}

async function generatePDF(){
    if(imagesArray.length===0){
        alert("Add images first!");
        return;
    }

    progressContainer.style.display="block";
    progressText.style.display="block";
    progressBar.style.width="0%";

    const compression=parseFloat(document.getElementById("compression").value);
    const pdf=new jsPDF("p","mm","a4");

    for(let i=0;i<imagesArray.length;i++){
        const img=new Image();
        img.src=imagesArray[i];

        await new Promise(resolve=>{
            img.onload=function(){
                const canvas=document.createElement("canvas");
                const ctx=canvas.getContext("2d");
                canvas.width=img.width;
                canvas.height=img.height;
                ctx.drawImage(img,0,0);

                const compressed=canvas.toDataURL("image/jpeg",compression);

                const pageWidth=pdf.internal.pageSize.getWidth();
                const pageHeight=pdf.internal.pageSize.getHeight();

                const imgProps=pdf.getImageProperties(compressed);

                const ratio=Math.max(
                    pageWidth/imgProps.width,
                    pageHeight/imgProps.height
                );

                const newWidth=imgProps.width*ratio;
                const newHeight=imgProps.height*ratio;

                const x=(pageWidth-newWidth)/2;
                const y=(pageHeight-newHeight)/2;

                if(i>0) pdf.addPage();
                pdf.addImage(compressed,"JPEG",x,y,newWidth,newHeight);
                resolve();
            }
        });

        let percent=Math.round(((i+1)/imagesArray.length)*100);
        progressBar.style.width=percent+"%";
        progressText.innerText=percent+"%";
    }

    pdf.save("Professional_Output.pdf");

    setTimeout(()=>{
        progressContainer.style.display="none";
        progressText.style.display="none";
    },800);
}
</script>

</body>
</html>
